<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Registration</title>

<style>
h2 {
  color: #ffffff;
  text-align: center;
  margin-top: 50px;
  font-size: 24px;
}
body {
  background: linear-gradient(135deg, #052659 0%, #082f72 100%);
  padding: 20px;
}
form {
  background: linear-gradient(135deg, #C1E8FF 0%, #a8d7f5 100%);
  padding: 30px;
  max-width: 400px;
  margin: 30px auto 0;
  border-radius: 8px;
}
input {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  margin-bottom: 15px;
}
button {
  padding: 10px 20px;
  background: linear-gradient(135deg, #052659, #0a3a8c);
  color: white;
  border: none;
}
</style>

</head>
<body>

<h2>Seller Registration</h2>

<form>
  <label>Full Name</label>
  <input type="text"><br>

  <label>Address</label>
  <input type="text"><br>

  <label>Phone Number</label>
  <input type="text"><br>

  <label>Email</label>
  <input type="text"><br>

  <label>Username</label>
  <input type="text"><br>

  <label>Password</label>
  <input type="password"><br>

  <button type="button">Register</button>
</form>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Used car search</title>
<style>
:root{
    --mainblue:#2563eb;
    --accent-start:#052659;
    --accent-end:#0a3a8c;
    --panel-start:#C1E8FF;
    --panel-end:#a8d7f5;
    --graytxt:#4a5568;
}
    *{box-sizing:border-box}
body{
  margin:0;
  font-family:"Microsoft YaHei",PingFang SC,sans-serif;
  font-size:15px;
  color:#1a202c;
  background:linear-gradient(135deg,#052659 0%,#082f72 100%);
  min-height:100vh;
}

a{color:var(--mainblue)}
a:hover{color:#1d4ed8}

button{cursor:pointer;border:none;font-family:inherit}

.navbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#222;
  color:#fff;
  padding:12px 30px;
  position:sticky;
  top:0;
  z-index:99;
}
.logo{height:40px}
.logo-link{
  display:inline-flex;
  line-height:0;
  text-decoration:none;
}
.logo-link:hover{opacity:.9}
.navbar .nav-menu{
  display:flex;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}
.navbar .nav-menu a{
  color:#fff;
  text-decoration:none;
  font-size:16px;
  padding:6px 10px;
}
.navbar .nav-menu a:hover{
  background:#444;
  border-radius:4px;
}
@media (max-width:768px){
  .navbar{
    flex-direction:column;
    gap:10px;
    padding:15px;
  }
  .navbar .nav-menu{justify-content:center}
  .discovery{margin:16px 12px 28px;padding:18px 14px 24px}
}

.discovery{
    max-width:1200px;
    margin:24px auto 40px;
    padding:24px 20px 32px;
    background:linear-gradient(135deg,var(--panel-start) 0%,var(--panel-end) 100%);
    border-radius:8px;
    box-shadow:0 4px 24px rgba(5,38,89,.15);
    min-height:auto;
}

.discovery-top{display:flex;align-items:center;gap:10px;margin-bottom:16px}

.search-wrap{
  flex:1;
  display:flex;
  border:1px solid rgba(5,38,89,.2);
  border-radius:999px;
  overflow:hidden;
  background:#fff;
  box-shadow:0 2px 8px rgba(5,38,89,.08);
}

.search-wrap input{
    flex:1;border:none;padding:10px 14px;font-size:15px;
}

.search-wrap .search-submit{
  background:linear-gradient(135deg,var(--accent-start),var(--accent-end));
  color:#fff;padding:0 20px;font-weight:bold;
}
.search-wrap .search-submit:hover{
  opacity:.94;
}

.section{margin-top:20px}

#hot-tag-rows > .hot-row{margin-top:12px}
#hot-tag-rows > .hot-row:first-of-type{margin-top:0}

.tag-row-title{margin-bottom:6px}

.rank-row-text{flex:1;min-width:0}
.rank-dash{color:#ccc}

.section-title{font-size:16px;font-weight:600;margin-bottom:10px;color:#052659}
.icon-spark{color:#082f72}

.history-tags,.hot-tags{
  display:flex;flex-wrap:wrap;gap:8px;
}

.tag{
  background:rgba(255,255,255,.75);
  color:var(--graytxt);
  border:1px solid rgba(5,38,89,.15);
  padding:6px 12px;border-radius:999px;font-size:13px;
}
.tag:hover{background:#fff;color:var(--accent-start);border-color:rgba(5,38,89,.35)}

.rank-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

@media (max-width:900px){
.rank-grid{grid-template-columns:1fr 1fr}
}

@media (max-width:560px){
  .rank-grid{grid-template-columns:1fr}
}

.rank-card{
  border:1px solid rgba(5,38,89,.18);
  border-radius:8px;
  background:rgba(255,255,255,.88);
}

.rank-card-header{
    padding:10px 12px;
    background:linear-gradient(135deg,#dbeafe 0%,#c1e8ff 100%);
    font-weight:bold;font-size:14px;
    color:#052659;
}

.rank-list{list-style:none;margin:0;padding:8px 0}

.rank-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-bottom:1px solid #eee;
}

.rank-num{width:22px;font-weight:bold;color:#999}
.rank-num.top3{color:#082f72}

.rank-thumb-ph{
  width:52px;height:40px;border-radius:4px;
  background:linear-gradient(135deg,#c1e8ff,#a8d7f5);
}

.rank-meta{font-size:12px;color:var(--graytxt)}

</style>
</head>
<body>

<div class="navbar">
  <a href="Homepage.html" class="logo-link" title="Back to home">
    <img src="logo.png" alt="Platform LOGO" class="logo">
  </a>
  <div class="nav-menu">
    <a href="Homepage.html">Home</a>
    <a href="SearchPage.html">Search Cars</a>
    <a href="login.html">Login</a>
    <a href="add%20cars%28final%20version%29.html">Post a Car</a>
  </div>
</div>

<div id="page-find" class="discovery">
  <header class="discovery-top">
    <form class="search-wrap" id="search-form" action="#">
      <input id="search-input" type="search" placeholder="Search brand, model, keyword…">
      <button class="search-submit" type="submit">Search</button>
    </form>
  </header>

  <section class="section">
    <h2 class="section-title">Recent searches</h2>
    <div class="history-tags">
      <span class="rank-meta">No recent records</span>
    </div>
  </section>

  <section class="section">
    <h2 class="section-title"><span class="icon-spark">✦</span> Trending today</h2>
    <div id="hot-tag-rows"></div>
  </section>

  <section class="section">
    <h2 class="section-title">Rankings</h2>
    <div class="rank-grid">
      <div class="rank-card">
        <div class="rank-card-header">🔥 Nationwide hot sales</div>
        <ol id="rank-sales" class="rank-list"></ol>
      </div>
      <div class="rank-card">
        <div class="rank-card-header">Price drops</div>
        <ol id="rank-drop" class="rank-list"></ol>
      </div>
      <div class="rank-card">
        <div class="rank-card-header">Hot searches</div>
        <ol id="rank-hotsearch" class="rank-list"></ol>
      </div>
      <div class="rank-card">
        <div class="rank-card-header">Most popular</div>
        <ol id="rank-pop" class="rank-list"></ol>
      </div>
    </div>
  </section>
</div>

<script>
var hotData=[
{title:"Brand / model",words:["BMW","Audi","Accord","Camry","Mercedes-Benz","Volkswagen","Tesla","BYD"]},
{title:"Body type",words:["SUV","EV","Large sedan","MPV","Sedan","Hybrid"]},
{title:"Price (CNY)",words:["Under 50k","50k–100k","100k–150k","150k–200k","200k–300k","300k–500k","500k+"]},
];

function putSearchText(keyword){
  document.getElementById("search-input").value=String(keyword!=null?keyword:"").trim();
}

function fillRanking(listId){
  var el=document.getElementById(listId);
  el.innerHTML="";
}

function drawHotWordRows(){
  var wrap=document.getElementById("hot-tag-rows");
  wrap.innerHTML="";
  for(var r=0;r<hotData.length;r++){
    var row=hotData[r];

    var section=document.createElement("div");
    section.className="section hot-row";

    var title=document.createElement("div");
    title.className="rank-meta tag-row-title";
    title.textContent=row.title;
    section.appendChild(title);

    var tagBox=document.createElement("div");
    tagBox.className="hot-tags";

    for(var w=0;w<row.words.length;w++){
      var word=row.words[w];
      var btn=document.createElement("button");
      btn.type="button";
      btn.className="tag";
      btn.dataset.word=word;
      btn.textContent=word;
      tagBox.appendChild(btn);
    }

    section.appendChild(tagBox);
    wrap.appendChild(section);
  }
}

function addHotTagClickHandler(){
  var wrap=document.getElementById("hot-tag-rows");
  wrap.addEventListener("click",function(e){
    var target=e.target;
    if(target&&target.matches("button.tag[data-word]")){
      putSearchText(target.getAttribute("data-word"));
    }
  });
}

drawHotWordRows();
addHotTagClickHandler();
["rank-sales","rank-drop","rank-hotsearch","rank-pop"].forEach(fillRanking);

document.getElementById("search-form").onsubmit=function(e){
  e.preventDefault();
  putSearchText(document.getElementById("search-input").value);
};
</script>
</body>
</html>

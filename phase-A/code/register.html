<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Registration</title>

<style>
* {
  box-sizing: border-box;
}
.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #222;
  color: white;
  padding: 12px 30px;
  position: sticky;
  top: 0;
  z-index: 99;
}
.logo {
  height: 40px;
}
.nav-menu {
  display: flex;
  align-items: center;
  gap: 20px;
}
.nav-menu a {
  color: white;
  text-decoration: none;
  font-size: 16px;
  padding: 6px 10px;
}
.nav-menu a:hover {
  background: #444;
  border-radius: 4px;
}
.logo-link {
  display: inline-flex;
  line-height: 0;
  text-decoration: none;
}
.logo-link:hover {
  opacity: 0.9;
}
@media (max-width: 768px) {
  .navbar {
    flex-direction: column;
    gap: 10px;
    padding: 15px;
  }
  .nav-menu {
    flex-wrap: wrap;
    justify-content: center;
  }
}
h2 {
  color: #ffffff;
  text-align: center;
  margin-top: 24px;
  font-size: 24px;
}
body {
  margin: 0;
  background: linear-gradient(135deg, #052659 0%, #082f72 100%);
  min-height: 100vh;
  font-family: "Microsoft YaHei", sans-serif;
}
.page-wrap {
  padding: 20px;
}
form {
  background: linear-gradient(135deg, #C1E8FF 0%, #a8d7f5 100%);
  padding: 30px;
  max-width: 400px;
  margin: 24px auto 0;
  border-radius: 8px;
}
input {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  margin-bottom: 15px;
}
button {
  padding: 10px 20px;
  background: linear-gradient(135deg, #052659, #0a3a8c);
  color: white;
  border: none;
}
.form-actions {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
}
</style>

</head>
<body>
<div class="navbar">
  <a href="Homepage.html" class="logo-link" title="Back to home">
    <img src="logo.png" alt="Platform LOGO" class="logo">
  </a>
  <div class="nav-menu">
    <a href="Homepage.html">Home</a>
    <a href="SearchPage.html">Search Cars</a>
    <a href="login.html">Login</a>
    <a href="add%20cars%28final%20version%29.html">Post a Car</a>
  </div>
</div>
<div class="page-wrap">
<h2>Seller Registration</h2>

<form>
  <label>Full Name</label>
  <input type="text"><br>

  <label>Address</label>
  <input type="text"><br>

  <label>Phone Number</label>
  <input type="text"><br>

  <label>Email</label>
  <input type="text"><br>

  <label>Username</label>
  <input type="text"><br>

  <label>Password</label>
  <input type="password"><br>

  <div class="form-actions">
    <button type="button">Register</button>
  </div>
</form>
</div>

</body>
</html>
